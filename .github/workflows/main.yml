# Workflow name
name: React CI Build Pipeline

# Trigger when code is pushed to main
on:
  push:
    branches:
      - main

jobs:
  build-react-app:

    # GitHub runner machine
    runs-on: ubuntu-latest

    # Default directory for all run commands
    defaults:
      run:
        working-directory: counter_app

    steps:
      # Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: counter_app/package-lock.json

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 5: Build React app
      - name: Build React App
        run: npm run build
